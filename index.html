<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mysterious Encounter...</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">

<style>

/* general */

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at 50% 0%,#3a2752,#09070f 70%);
font-family:'Crimson Text',serif;
color:#e6d9b8;
overflow:hidden;
}

/* particles */

.particle{
position:absolute;
width:3px;
height:3px;
background:white;
opacity:.2;
animation:float 20s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* watcher */

.watcher{
position:absolute;
left:20px;
bottom:40px;
height:420px;
opacity:.9;
filter:drop-shadow(0 0 30px #000);
pointer-events:none;
animation:watcherFloat 4s ease-in-out infinite;
transition:1s;
}

@keyframes watcherFloat{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* watcher defeat */

.watcher-defeated{
transform:rotate(90deg) translateY(200px);
opacity:0;
}

/* event box */

.event-box{
background:#1a1424;
border:3px solid #8c6b3c;
padding:40px;
width:460px;
text-align:center;
box-shadow:
0 0 40px black,
inset 0 0 40px rgba(0,0,0,.7);
}

.event-box h1{
font-family:'Cinzel',serif;
letter-spacing:2px;
}

/* buttons */

button{
display:block;
width:100%;
margin:10px 0;
padding:12px;
font-size:16px;
border:2px solid #8c6b3c;
background:#2c213b;
color:#e6d9b8;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#4a3563;
}

/* reward screen */

.reward-screen{
text-align:center;
width:1000px;
}

.reward-title{
font-family:'Cinzel',serif;
font-size:52px;
letter-spacing:3px;
}

.reward-sub{
font-size:26px;
margin-bottom:40px;
}

/* cards */

.card-container{
display:flex;
justify-content:center;
gap:40px;
animation:cardsIn .7s ease;
}

@keyframes cardsIn{
from{transform:translateY(80px);opacity:0}
to{transform:translateY(0);opacity:1}
}

.card{
width:220px;
height:320px;
position:relative;
cursor:pointer;
transition:.25s;
}

.card:hover{
transform:translateY(-20px) scale(1.07);
}

.card-frame{
position:absolute;
inset:0;
background:url("card.jpg") center/contain no-repeat;
z-index:1;
}

.card-title{
position:absolute;
top:22px;
width:100%;
text-align:center;
font-family:'Cinzel',serif;
font-size:18px;
z-index:2;
}

.card-art{
position:absolute;
top:70px;
left:38px;
width:144px;
height:104px;
border-radius:6px;
background-size:cover;
background-position:center;
border:2px solid rgba(0,0,0,0.6);
box-shadow:inset 0 0 8px rgba(0,0,0,0.7);
z-index:2;
}

.art1{
background-image:url("art1.png");
}

.art2{
background-image:url("art2.png");
}

.art3{
background-image:url("art3.png");
}

.card-desc{
position:absolute;
bottom:55px;
left:36px;
width:148px;
text-align:center;
font-size:15px;
line-height:1.25;
z-index:2;
}

/* rarity glow */

.uncommon{filter:drop-shadow(0 0 10px #7db8ff);}
.rare{filter:drop-shadow(0 0 18px gold);}

/* relic */

.relic-screen{
text-align:center;
animation:fadeIn 1s;
}

.relic-title{
font-family:'Cinzel',serif;
font-size:42px;
color:gold;
margin-bottom:20px;
}

@keyframes fadeIn{
from{opacity:0; transform:scale(.9)}
to{opacity:1}
}

/* defeat screen */

.defeat{
font-family:'Cinzel',serif;
font-size:70px;
color:#ff6464;
text-align:center;
}

/* sparkles */

.sparkle{
position:absolute;
font-size:20px;
animation:sparkle 2s infinite;
}

@keyframes sparkle{
0%{opacity:0; transform:scale(.5)}
50%{opacity:1; transform:scale(1.2)}
100%{opacity:0}
}

/* screen shake */

@keyframes shake{
0%{transform:translate(0)}
25%{transform:translate(-6px,4px)}
50%{transform:translate(6px,-4px)}
75%{transform:translate(-4px,-3px)}
100%{transform:translate(0)}
}

.shake{
animation:shake .4s;
}

.defeat-boss{
margin-top:30px;
height:320px;
opacity:0;
animation:bossAppear 1.5s ease forwards;
}

@keyframes bossAppear{
0%{
opacity:0;
transform:scale(0.8);
}
100%{
opacity:1;
transform:scale(1);
}
}

</style>
</head>

<body>

<img class="watcher" id="watcher" src="Watcher.webp">

<div id="game"></div>

<script>

const game=document.getElementById("game")
const watcher=document.getElementById("watcher")

/* particles */

for(let i=0;i<40;i++){
let p=document.createElement("div")
p.className="particle"
p.style.left=Math.random()*100+"vw"
p.style.animationDuration=15+Math.random()*10+"s"
document.body.appendChild(p)
}

/* event */

function loadEvent(){

game.innerHTML=`

<div class="event-box">

<h1>❓ Mysterious Encounter</h1>

<p id="dialogue">...</p>

<button onclick="yesClicked()">Accept the Quest</button>
<button onclick="noClicked()">Lose Fight</button>

</div>
`

startDialogue()

}

loadEvent()

/* typing */

function startDialogue(){

const text="At the summit of the Spire you encounter your girlfriend. She tilts her head and smiles... \"Will you go on a date with me?\""

let i=0

function type(){
if(i<text.length){
document.getElementById("dialogue").innerHTML+=text[i]
i++
setTimeout(type,25)
}
}

type()

}

/* NO BUTTON → watcher defeat */

function noClicked(){

document.body.classList.add("shake")

watcher.classList.add("watcher-defeated")

game.innerHTML = `
<div class="relic-screen">

<div class="defeat">DEFEAT...</div>

<img src="endboss.png" class="defeat-boss">

<p style="margin-top:20px;font-size:20px">
The final boss emerges.<br>
Perhaps refusing the date was a mistake...
</p>

</div>
`

}

/* reward */

function yesClicked(){

game.innerHTML=`

<div class="reward-screen">

<div class="reward-title">VICTORY!</div>
<div class="reward-sub">Choose Your Reward</div>

<div class="card-container">

<div class="card" onclick="pickDate('Butter Fingers')">
<div class="card-frame"></div>
<div class="card-title">🎬 Butter Fingers</div>
<div class="card-art art1"></div>
<div class="card-desc">
Skip your next combat and enjoy filthy buttery popcorn and an exciting movie instead... don't get too excited tho.
</div>
</div>

<div class="card uncommon" onclick="pickDate('Heated Mystery')">
<div class="card-frame"></div>
<div class="card-title">🔥 Heated Mystery</div>
<div class="card-art art2"></div>
<div class="card-desc">
At the next Rest Site enter a steamy room toghether. Ensure no one else is watching...
</div>
</div>

<div class="card rare" onclick="pickDate('Risk it All')">
<div class="card-frame"></div>
<div class="card-title">⚡ Risk it All</div>
<div class="card-art art3"></div>
<div class="card-desc">
Leap your sword into roaring waterfalls and risk everything. The winner takes it all.
</div>
</div>

</div>

</div>
`

}

/* relic */

function pickDate(choice){

document.body.classList.add("shake")

setTimeout(()=>{

game.innerHTML=`

<div class="relic-screen">

<div class="relic-title">✨ REWARD OBTAINED ✨</div>

<h2>${choice}</h2>

<p>
Effect:<br>
Gain +50 Happiness and +1 Happypenis.<br>
</p>

</div>
`

},350)

/* sparkles */

for(let i=0;i<25;i++){
let s=document.createElement("div")
s.className="sparkle"
s.innerHTML="✨"
s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"
s.style.animationDelay=Math.random()*2+"s"
document.body.appendChild(s)
}

}

</script>

</body>
</html>
