<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mysterious Event...</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #2d1b3f, #09070f);
  font-family: Georgia, serif;
  color:#e6d9b8;
}

.event-box{
  background:#1a1424;
  border:3px solid #8c6b3c;
  padding:40px;
  width:420px;
  text-align:center;
  box-shadow:0 0 25px black;
}

h1{
  font-size:28px;
  margin-bottom:20px;
}

p{
  margin-bottom:30px;
}

button{
  display:block;
  width:100%;
  margin:10px 0;
  padding:12px;
  font-size:16px;
  border:2px solid #8c6b3c;
  background:#2c213b;
  color:#e6d9b8;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#4a3563;
}

#noBtn{
  position:relative;
}
</style>
</head>

<body>

<div class="event-box">

<h1>❓ Mysterious Encounter</h1>

<p>
You encounter your girlfriend at the top of the Spire.
She asks a question...
</p>

<p><strong>"Will you go on a date with me?"</strong></p>

<button onclick="yesClicked()">Accept the quest</button>
<button id="noBtn">Ignore her</button>

</div>

<script>

const noBtn = document.getElementById("noBtn")

function moveButton(){
  const x = Math.random() * (window.innerWidth - 150)
  const y = Math.random() * (window.innerHeight - 60)

  noBtn.style.position = "absolute"
  noBtn.style.left = x + "px"
  noBtn.style.top = y + "px"
}

noBtn.addEventListener("mouseover", moveButton)
noBtn.addEventListener("touchstart", function(e){
  e.preventDefault()
  moveButton()
})

function yesClicked(){
  document.body.innerHTML = `
  <div style="text-align:center;margin-top:20%;font-family:Georgia;color:#e6d9b8">
    <h1>✨ Quest Accepted ✨</h1>
    <p>You gained:</p>
    <p>❤️ +10 Happiness</p>
    <p>🍕 Pizza Night</p>
    <p>🎬 Movie Date</p>
  </div>
  `
}

</script>

</body>
</html>
